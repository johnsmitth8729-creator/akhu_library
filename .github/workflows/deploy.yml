name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy application
        run: |
          cd /home/boss/akhu_library

          git fetch origin
          git reset --hard origin/main

          /home/boss/akhu_library/venv/bin/pip install -r requirements.txt

          /home/boss/akhu_library/venv/bin/flask db upgrade

          sudo systemctl restart akhu