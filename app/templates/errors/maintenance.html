<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduled Maintenance – Al-Khwarizmi Smart Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 500px;
            background: #13131a;
            border: 1px solid #2a2a3a;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, #fdcb6e, #e67e22);
            border-radius: 22px;
            z-index: -1;
            opacity: 0.15;
        }
        .icon-wrapper {
            width: 80px; height: 80px;
            background: rgba(253, 203, 110, 0.1);
            color: #fdcb6e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            border: 1px solid rgba(253, 203, 110, 0.2);
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(253, 203, 110, 0.4); }
            100% { transform: scale(1.05); box-shadow: 0 0 20px 5px rgba(253, 203, 110, 0.1); }
        }
        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #8892a4;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(253, 203, 110, 0.15);
            color: #fdcb6e;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .status-dot {
            width: 8px; height: 8px;
            background: #fdcb6e;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.3; }
        }
        .footer {
            font-size: 12px;
            color: #556270;
            margin-top: 10px;
            border-top: 1px solid #2a2a3a;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <span class="status-dot"></span> Under Maintenance
        </div>
        <div class="icon-wrapper">
            <i class="fas fa-screwdriver-wrench"></i>
        </div>
        <h1>Scheduled Upgrades</h1>
        <p>Al-Khwarizmi Smart Library is temporarily offline for scheduled system upgrades and database maintenance. We will be back online shortly.</p>
        <div class="footer">
            &copy; 2026 Al-Khwarizmi Smart Library Platform
        </div>
    </div>
</body>
</html>
