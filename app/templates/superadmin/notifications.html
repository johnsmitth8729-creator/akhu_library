{% extends "superadmin/layout.html" %}
{% block title %}Send Notifications{% endblock %}
{% block breadcrumb %}Send Notifications{% endblock %}

{% block content %}
<div class="sa-page-header">
    <div class="sa-page-title"><i class="fas fa-bell"></i> Send System Notifications</div>
    <div class="sa-page-subtitle">Dispatch announcements and warnings directly to user notification bars.</div>
</div>

<div style="max-width: 800px; margin: 0 auto;">
    <div class="sa-card">
        <div class="sa-card-title">
            <i class="fas fa-paper-plane"></i> Broadcast Message
        </div>
        <form action="{{ url_for('superadmin.notifications') }}" method="POST" id="notificationForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="sa-form-group">
                <label class="sa-form-label" for="target">Target Audience</label>
                <select class="sa-form-select" name="target" id="target" onchange="toggleUserSelect()">
                    <option value="all">All Users</option>
                    <option value="admin">Administrators Only</option>
                    <option value="librarian">Librarians Only</option>
                    <option value="user">Regular Users Only</option>
                    <option value="specific">Specific Individual User</option>
                </select>
            </div>

            <div class="sa-form-group" id="userSelectGroup" style="display: none;">
                <label class="sa-form-label" for="user_id">Select User</label>
                <select class="sa-form-select" name="user_id" id="user_id">
                    <option value="">-- Choose User --</option>
                    {% for u in all_users %}
                    <option value="{{ u.id }}">{{ u.fullname }} (@{{ u.username }} - {{ u.role }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="sa-form-group">
                <label class="sa-form-label" for="ntype">Notification Style</label>
                <select class="sa-form-select" name="ntype" id="ntype">
                    <option value="info">Info (Blue)</option>
                    <option value="success">Success (Green)</option>
                    <option value="warning">Warning (Orange)</option>
                    <option value="danger">Danger (Red)</option>
                </select>
            </div>

            <div class="sa-form-group">
                <label class="sa-form-label" for="message">Message Content</label>
                <textarea class="sa-form-textarea" name="message" id="message" placeholder="Type notification message here..." required></textarea>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
                <button type="button" class="sa-btn sa-btn-ghost" onclick="resetForm()">
                    <i class="fas fa-undo"></i> Reset Form
                </button>
                <button type="submit" class="sa-btn sa-btn-primary">
                    <i class="fas fa-paper-plane"></i> Send Notification
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleUserSelect() {
        const target = document.getElementById('target').value;
        const userGroup = document.getElementById('userSelectGroup');
        if (target === 'specific') {
            userGroup.style.display = 'block';
            document.getElementById('user_id').setAttribute('required', 'required');
        } else {
            userGroup.style.display = 'none';
            document.getElementById('user_id').removeAttribute('required');
        }
    }

    function resetForm() {
        document.getElementById('notificationForm').reset();
        toggleUserSelect();
    }
</script>
{% endblock %}
